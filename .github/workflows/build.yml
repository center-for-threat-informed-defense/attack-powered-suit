name: Build Extensions

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-ubuntu:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    - name: Install Build Dependencies (include dev)
      run: npm ci --include=dev
    - name: Verify install
      run: |
        npm ls svelte-jester || true
        npm ls jest || true
        npm ls @testing-library/svelte || true
    - name: Verify toolchain versions
      run: |
        node -v
        npm -v
        npx jest --version
    - name: Run Unit Tests
      run: npm run test
    - name: Upload Coverage to CodeCov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_SECRET }}
        files: coverage/coverage-final.json
        verbose: true
    - name: Fetch ATT&CK STIX Data
      run: npm run fetch-attack
    - name: Build Search Index
      run: npm run build-index
    - name: Build Svelte Application
      run: npm run build
    - name: Build Chrome extension
      run: make chrome-ext
    - name: Package Chrome Extension
      uses: actions/upload-artifact@v4
      with:
        name: attack-powered-suit-chrome
        path: browsers/chrome/
    - name: Build Firefox extension
      run: make firefox-ext
    - name: Package Chrome Extension
      uses: actions/upload-artifact@v4
      with:
        name: attack-powered-suit-firefox
        path: browsers/firefox/
